<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu Creativity Center | Choose Your Language</title>
    <meta name="description" content="Welcome to Edu Creativity Center. Please select your preferred language to continue.">

    <link rel="canonical" href="https://educerativitycenter.com/" />
    <link rel="alternate" hreflang="en" href="https://educerativitycenter.com/en/" />
    <link rel="alternate" hreflang="ar" href="https://educerativitycenter.com/ar/" />
    <link rel="alternate" hreflang="x-default" href="https://educerativitycenter.com/" />

    <meta property="og:title" content="EDU CREATIVITY CENTER | Choose Your Language" />
    <meta property="og:description" content="Welcome to Edu Creativity Center. Please select your preferred language to continue." />
    <meta property="og:url" content="https://educerativitycenter.com/" />
    <meta property="og:type" content="website" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            pink: '#E11D48',
                            pinkHover: '#BE123C',
                            blue: '#0782c7',
                            dark: '#0F172A',
                            text: '#334155',
                            heading: '#020617',
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'Inter', 'sans-serif'],
                        arabic: ['Tajawal', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="images/logo.webp" type="image/webp">
</head>

<body class="bg-slate-50 text-brand-text font-sans min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background Decor -->
    <div class="absolute inset-0 z-0 pointer-events-none opacity-40">
        <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_top_right,#E11D48_0%,transparent_40%)] opacity-20"></div>
        <div class="absolute bottom-0 right-0 w-full h-full bg-[radial-gradient(circle_at_bottom_left,#0782c7_0%,transparent_40%)] opacity-20"></div>
    </div>

    <div class="relative z-10 bg-white p-10 md:p-16 rounded-3xl shadow-2xl border border-gray-100 max-w-lg w-full mx-6 text-center transition-all duration-500 hover:shadow-brand-pink/10">
        <div class="mb-10 flex justify-center">
            <img src="images/logo.webp" alt="EDU CREATIVITY CENTER Logo" class="h-20 w-auto object-contain">
        </div>
        
        <h1 class="text-2xl md:text-3xl font-bold text-brand-heading mb-3">Welcome to<br><span class="text-brand-pink">Edu Creativity Center</span></h1>
        <p class="text-gray-500 mb-10">Please select your preferred language.</p>

        <div class="flex flex-col gap-4">
            <a href="/en/" class="group relative flex items-center justify-between p-4 rounded-xl border-2 border-gray-100 hover:border-brand-blue hover:bg-blue-50 transition-all duration-300">
                <span class="text-lg font-bold text-brand-heading group-hover:text-brand-blue transition-colors">English</span>
                <span class="text-brand-blue opacity-0 group-hover:opacity-100 transform translate-x-2 group-hover:translate-x-0 transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
                </span>
            </a>
            <a href="/ar/" class="group relative flex items-center justify-between p-4 rounded-xl border-2 border-gray-100 hover:border-brand-pink hover:bg-pink-50 transition-all duration-300 font-arabic" dir="rtl">
                <span class="text-lg font-bold text-brand-heading group-hover:text-brand-pink transition-colors">العربية</span>
                <span class="text-brand-pink opacity-0 group-hover:opacity-100 transform -translate-x-2 group-hover:translate-x-0 transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg>
                </span>
            </a>
        </div>
    </div>
</body>
</html>
